name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, edited]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # for Codecov OIDC

jobs:
  # Detect whether non-doc files changed so test jobs can be skipped on
  # documentation-only PRs while format:check still runs on every PR.
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.check.outputs.code }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # For pushes to main and manual runs, always run all jobs.
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "code=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # For pull requests, fetch the list of changed files from the
          # GitHub API (paginated to handle large PRs).
          FILES=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files --paginate --jq '.[].filename')

          # Check each changed file against the doc/config-only patterns.
          # If ANY file falls outside these patterns, it's a code change
          # and we need to run the full test suite.
          for f in $FILES; do
            case "$f" in
              # These patterns mirror the old workflow-level paths-ignore list.
              *.md|docs/*|.github/*|.prettierignore|AUTHORS|LICENSE) ;;
              # A non-doc file was found — flag code changes and stop early.
              *) echo "code=true" >> $GITHUB_OUTPUT; exit 0 ;;
            esac
          done

          # Every changed file matched the doc/config patterns, so this
          # is a documentation-only PR — skip test/lint jobs.
          echo "code=false" >> $GITHUB_OUTPUT

  format:
    uses: ./.github/workflows/npm-script.yml
    with:
      npm-script: format:check

  lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/npm-script.yml
    with:
      npm-script: lint

  smoke:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/npm-script.yml
    with:
      node-versions: "20,22,24"
      npm-script: test-smoke

  test-node-lts:
    # TODO: Restore "mocha-github-actions-reporter" style reporting without relying on third party module
    # https://github.com/mochajs/mocha/issues/5183
    needs: [changes, smoke]
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/npm-script.yml
    strategy:
      fail-fast: false
      matrix:
        test-part:
          - interfaces
          - unit
          - integration
          - jsapi
          - requires
          - reporters
          - only
    with:
      npm-script: test-node:${{ matrix.test-part }}

  test-node-all:
    name: Test ${{ matrix.test-part }} in all environments
    permissions:
      id-token: write # for Codecov OIDC
      contents: read # for Codecov OIDC
    # TODO: Restore "mocha-github-actions-reporter" style reporting without relying on third party module
    # https://github.com/mochajs/mocha/issues/5183
    needs: [changes, test-node-lts]
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/npm-script.yml
    strategy:
      fail-fast: false
      matrix:
        coverage: [true]
        test-part:
          - interfaces
          - unit
          - integration
          - requires
          - reporters
          - only
        include:
          - test-part: jsapi
            coverage: false
    with:
      os: "ubuntu-latest,windows-latest"
      # We pin exact versions here per https://github.com/mochajs/mocha/issues/5052
      # Ref https://nodejs.org/en/about/previous-releases
      node-versions: "20.19.4,22.18.0,24.6.0"
      npm-script: test-node:${{ matrix.test-part }}
      coverage: ${{ matrix.coverage }}

  test-browser-local:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/npm-script.yml
    with:
      browsers: ChromeHeadless
      npm-script: test-browser

  tsc:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/npm-script.yml
    with:
      npm-script: tsc
