name: Tests

on:
  push:
    branches:
      - main
    paths-ignore:
      ["*.md", "docs/**", ".github/**", ".prettierignore", "AUTHORS", "LICENSE"]
  pull_request:
    branches:
      - main
    paths-ignore:
      ["*.md", "docs/**", ".github/**", ".prettierignore", "AUTHORS", "LICENSE"]
    types: [opened, synchronize, reopened, edited]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # for Codecov OIDC

jobs:
  lint:
    uses: ./.github/workflows/npm-script.yml
    with:
      npm-script: lint

  smoke:
    uses: ./.github/workflows/npm-script.yml
    with:
      # We use old exact versions and new ambiguous versions here per
      # https://github.com/mochajs/mocha/issues/5052
      # Versions tested:
      # - Lowest supported patch of referenced majors in package.json
      # - Highest patch of all LTS majors
      node-versions: "20.19.0,20,22.12.0,22,24,26"
      npm-script: test-smoke

  test-node-lts:
    # TODO: Restore "mocha-github-actions-reporter" style reporting without relying on third party module
    # https://github.com/mochajs/mocha/issues/5183
    uses: ./.github/workflows/npm-script.yml
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        test-part:
          - interfaces
          - unit
          - integration
          - jsapi
          - requires
          - reporters
          - only
    with:
      npm-script: test-node:${{ matrix.test-part }}

  test-node-all:
    name: Test ${{ matrix.test-part }} in all environments
    permissions:
      id-token: write # for Codecov OIDC
      contents: read # for Codecov OIDC
    # TODO: Restore "mocha-github-actions-reporter" style reporting without relying on third party module
    # https://github.com/mochajs/mocha/issues/5183
    uses: ./.github/workflows/npm-script.yml
    needs: test-node-lts
    strategy:
      fail-fast: false
      matrix:
        coverage: [true]
        test-part:
          - interfaces
          - unit
          - integration
          - requires
          - reporters
          - only
        include:
          - test-part: jsapi
            coverage: false
    with:
      os: "ubuntu-latest,windows-latest"
      # We pin exact versions here per
      # https://github.com/mochajs/mocha/issues/5052
      # Ref https://nodejs.org/en/about/previous-releases
      # Versions tested:
      # - Lowest patch of EOL majors still supported
      # - Lowest patch of explicitly referenced majors
      # - Highest known patch of all LTS majors (updated sporadically)
      node-versions: "20.19.0,20.20.2,22.12.0,22.23.1,24.18.0,26.5.0"
      npm-script: test-node:${{ matrix.test-part }}
      coverage: ${{ matrix.coverage }}

  test-browser:
    name: Browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci --ignore-scripts
      - run: npm run test-browser
        env:
          NODE_OPTIONS: "--trace-warnings"

  tsc:
    uses: ./.github/workflows/npm-script.yml
    with:
      npm-script: tsc
